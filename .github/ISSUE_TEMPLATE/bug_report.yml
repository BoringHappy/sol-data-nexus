name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead
      placeholder: |
        When I run... I get an error...
        I expected it to...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run '...'
        2. Execute '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment (optional)
      description: OS, versions, architecture, etc.
      placeholder: |
        - OS: Ubuntu 22.04
        - Version: 1.0.0

  - type: textarea
    id: logs
    attributes:
      label: Logs or Additional Context (optional)
      placeholder: Paste logs or add additional information here...
      render: shell
